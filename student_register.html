<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UIC | Student Registration</title>

  <link rel="stylesheet" href="css/student_register.css">

  <script src="js/student_register.js"></script>

</head>

<body>
  <header>
    <img src="images/uic logo.jpg" alt="UIC Logo" />
    <h1>University Institute of Computing</h1>
    <h2><u>Student Information System</u></h2>
  </header>

  <main>
    <div class="register-card">
      <h2>📝 Student Registration Form</h2>
      <form onsubmit="registerUser(event)">
        <!-- Column Fields -->
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullname" placeholder="Enter Your Name" required>
        </div>

        <div class="form-group">
          <label>Father's Name</label>
          <input type="text" id="fathername" placeholder="Father's Name">
        </div>

        <div class="form-group">
          <label>Mother's Name</label>
          <input type="text" id="mothername" placeholder="Mother's Name">
        </div>

        <div class="form-group">
          <label>Date of Birth</label>
          <input 
            type="date" 
            id="dob" 
            max="" 
            onkeydown="return false;" 
            onclick="this.showPicker();" 
            required
          >
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select id="gender">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="mobile" placeholder="Mobile Number">
        </div>

        <div class="form-group">
          <label>Alternate Number</label>
          <input type="tel" id="altmobile" placeholder="Alternate Mobile Number">
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" id="address" placeholder="Enter Address">
        </div>

        <div class="form-group">
          <label>City</label>
          <input type="text" id="city" placeholder="Enter City">
        </div>

        <div class="form-group">
          <label>State</label>
          <input type="text" id="state" placeholder="Enter State">
        </div>

        <div class="form-group">
          <label>Pincode</label>
          <input type="number" id="pincode" placeholder="Enter Pincode">
        </div>

        <div class="form-group">
          <label>Nationality</label>
          <input type="text" id="nationality" placeholder="Enter Nationality">
        </div>

        <div class="form-group">
          <label>Course</label>
          <select id="course">
            <option value="">Select Course</option>
            <option>BCA</option>
            <option>MCA</option>
            <option>B.Tech</option>
            <option>M.Tech</option>
          </select>
        </div>

        <div class="form-group">
          <label>Semester</label>
          <input type="number" id="semester" min="1" max="8" placeholder="Semester">
        </div>

        <div class="form-group">
          <label>CUCET ID</label>
          <input type="text" id="cucetId" placeholder="Enter CUCET ID">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Password" required>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmpassword" placeholder="Confirm Password" required>
        </div>

        <div class="form-group">
          <label>Upload Photo</label>
          <input type="file" id="photo" accept="image/*">
        </div>

        <div class="buttons">
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
          <button type="button" onclick="window.location.href='staff_login.html'">Back to Login</button>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>© 2025 University Institute of Computing (UIC). All Rights Reserved.</p>
    <p>Address: UIC Campus, City Road, Kharar, India</p>
  </footer>
</body>
</html>
